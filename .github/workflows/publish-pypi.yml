name: publish-pypi

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync package version from tag
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$V\"/" python/pyproject.toml

      - run: pip install build && python -m build python/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
