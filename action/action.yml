name: 'Backfill'
description: 'Run a command with a sponsored line in the CI log. Set device to credit impressions.'
branding:
  icon: 'dollar-sign'
  color: 'yellow'
inputs:
  run:
    description: 'Command to run'
    required: true
  device:
    description: 'Backfill device id from bf status. Without it, the line can render but no impression is credited.'
    required: false
    default: ''
  api:
    description: 'Backfill API base'
    required: false
    default: 'https://backfill.sh'
runs:
  using: composite
  steps:
    - shell: bash
      env:
        BF_API: ${{ inputs.api }}
        BF_DEVICE: ${{ inputs.device }}
        BF_RUN: ${{ inputs.run }}
      run: |
        bash "$GITHUB_ACTION_PATH/run.sh"
